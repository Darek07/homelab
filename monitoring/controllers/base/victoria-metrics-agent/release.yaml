apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-agent
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-agent
      version: "0.42.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-agent
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    remoteWrite:
      - url: "http://victoria-metrics-single-server.monitoring.svc:8429/api/v1/write"
