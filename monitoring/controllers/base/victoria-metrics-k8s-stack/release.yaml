apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.85.9"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-k8s-stack
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    vmsingle:
      spec:
        retentionPeriod: "1w"
        storage:
          resources:
            requests:
              storage: 5Gi
