apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-single
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-single
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    server:
      scrape:
        enabled: true
        config:
          global:
            scrape_interval: 60s
